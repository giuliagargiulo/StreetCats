<app-navbar></app-navbar>

<section class="cat-details" *ngIf="cat; else loadingTemplate">

  <div class="intro">
    <div class="header">
      <h1 class="title">{{ cat.title }}</h1>
      <p class="date">Sighted on: {{ cat.created_at | date:'longDate' }}</p>
    </div>

    <div class="image">
        <img [src]="cat.picture_url" [alt]="cat.title" class="cat-image">
    </div>

    <div class="description">
      <h2>Description</h2>
      <div [innerHTML]="cat.description"></div>
    </div>

    <div id="map-container">
      <app-map [cats]="[cat]" size="medium"></app-map>
    </div>
  </div>

  <div class="comments-section">
    <h2>Comments ({{ comments.length }})</h2>

    <div class="comment" *ngFor="let comment of comments">
      <p><strong>{{ comment.author }}:</strong> {{ comment.text }}</p>
      <span>{{ comment.created_at | timeago }}</span>
    </div>

    <form [formGroup]="commentForm" (ngSubmit)="onSubmit()" class="add-comment">
      <textarea formControlName="text" placeholder="Add a comment..."></textarea>
      <button type="submit" [disabled]="commentForm.invalid">Add Comment</button>
    </form>
  </div>

</section>

<template #loadingTemplate>
  <div class="loading-spinner">
    <p>Caricamento dei dettagli del gatto in corso...</p>
  </div>
</template>

<app-footer></app-footer>
