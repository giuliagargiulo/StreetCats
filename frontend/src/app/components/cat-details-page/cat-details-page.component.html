
<app-navbar></app-navbar>

<section class="cat-details" *ngIf="cat; else loadingTemplate">

  <div class="intro">
    <div class="header">
      <h1 class="title">{{ cat.title }}</h1>
      <p class="date">Sighted on: {{ cat.created_at | date:'longDate' }}</p>
    </div>

    <div class="image">
        <img [src]="cat.picture_url" [alt]="cat.title" class="cat-image">
    </div>

    <div class="description">
      <h2>Description</h2>
      <div [innerHTML]="cat.description"></div>
    </div>

    <div id="map-container">
      <app-map [cats]="[cat]" size="medium"></app-map>
    </div>
  </div>

  <div class="comments-section">
    <h2>Comments ({{ comments.length }})</h2>

    <div class="comment" *ngFor="let comment of comments">
      <p><strong>{{ comment.username }}:</strong> {{ comment.content }}</p>
      <span id="timeago">{{ comment.created_at | timeago }}</span>
    </div>

    <form [formGroup]="commentForm" (ngSubmit)="onSubmit()" class="add-comment">
      <textarea formControlName="text" placeholder="Add a comment..."></textarea>
      <button type="submit" [disabled]="commentForm.invalid">Add Comment</button>
    </form>
  </div>

</section>

<ng-template #loadingTemplate>
  <section class="cat-details">

    <div class="intro">

      <div class="header">
        <div class="skeleton skeleton-title"></div>
        <div class="skeleton skeleton-date"></div>
      </div>

      <div class="image">
        <div class="skeleton cat-image"></div>
      </div>

      <div class="description">
        <div class="skeleton skeleton-title-small"></div> <div class="skeleton skeleton-text-line"></div>
        <div class="skeleton skeleton-text-line"></div>
        <div class="skeleton skeleton-text-line short"></div>
      </div>

      <div id="map-container">
        <div class="skeleton skeleton-map"></div>
      </div>

    </div>

    <div class="comments-section">

      <div class="skeleton skeleton-comments-title"></div> <div class="comment">
        <div class="skeleton skeleton-comment-author"></div>
        <div class="skeleton skeleton-comment-text"></div>
      </div>

      <div class="comment">
        <div class="skeleton skeleton-comment-author"></div>
        <div class="skeleton skeleton-comment-text"></div>
      </div>

      <div class="add-comment">
        <div class="skeleton skeleton-textarea"></div>
        <div class="skeleton skeleton-button"></div>
      </div>

    </div>

  </section>
</ng-template>

<app-footer></app-footer>
